{% extends "core/base.html" %}

{% block title %}Study Planner | Timer{% endblock title %}

{% block content %}

<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-emerald-200 via-sky-200 to-indigo-200 px-4">

  <div class="relative backdrop-blur-2xl bg-white/85 w-full max-w-sm px-8 py-10 rounded-[2.5rem]
              shadow-[0_25px_70px_rgba(0,0,0,0.18)] text-center border border-white/50">

    <!-- Header -->
    <h1 class="text-[1.9rem] font-extrabold tracking-tight text-gray-800">
      Study Timer
    </h1>

    <p id="modeText" class="mt-1 mb-7 text-sm font-medium text-gray-500 flex items-center justify-center gap-2">
      <i class="fa-solid fa-clock text-emerald-500"></i>
      <span>Focus Time</span>
    </p>

    <!-- Adjust Time -->
    <div class="flex items-center justify-center gap-4 mb-7">

      <button id="minusBtn"
        class="w-11 h-11 rounded-full bg-gray-200 hover:bg-gray-300
               active:scale-95 transition text-xl flex items-center justify-center">
        <i class="fa-solid fa-minus"></i>
      </button>

      <div class="h-11 px-4 rounded-full bg-gray-100 flex items-center justify-center
                  text-[0.65rem] tracking-widest uppercase text-gray-500 select-none">
        Adjust Time
      </div>

      <button id="plusBtn"
        class="w-11 h-11 rounded-full bg-gray-200 hover:bg-gray-300
               active:scale-95 transition text-xl flex items-center justify-center">
        <i class="fa-solid fa-plus"></i>
      </button>

    </div>

    <!-- Progress Ring -->
    <div class="relative w-56 h-56 mx-auto mb-9 flex items-center justify-center">

      <svg class="absolute w-full h-full -rotate-90">
        <circle cx="112" cy="112" r="98"
          stroke="#e5e7eb" stroke-width="14" fill="none"/>

        <circle id="progressCircle"
          cx="112" cy="112" r="98"
          stroke="#22c55e" stroke-width="14"
          fill="none" stroke-linecap="round"/>
      </svg>

      <div class="flex flex-col items-center justify-center text-center">
        <span id="timer"
          class="text-4xl font-mono font-bold text-gray-800 leading-none">
          25:00:00
        </span>

        <span class="mt-2 text-[0.65rem] tracking-widest text-gray-400 uppercase">
          Min · Sec · Ms
        </span>
      </div>

    </div>

    <!-- Controls -->
    <div class="grid grid-cols-3 gap-3">
      <button id="startBtn"
        class="h-11 rounded-xl bg-emerald-500 hover:bg-emerald-600
               text-white text-sm font-semibold active:scale-95 flex items-center justify-center gap-2">
        <i class="fa-solid fa-play"></i> Start
      </button>

      <button id="pauseBtn"
        class="h-11 rounded-xl bg-amber-400 hover:bg-amber-500
               text-white text-sm font-semibold active:scale-95 flex items-center justify-center gap-2">
        <i class="fa-solid fa-pause"></i> Pause
      </button>

      <button id="resetBtn"
        class="h-11 rounded-xl bg-rose-500 hover:bg-rose-600
               text-white text-sm font-semibold active:scale-95 flex items-center justify-center gap-2">
        <i class="fa-solid fa-rotate-left"></i> Reset
      </button>
    </div>

  </div>
</div>

<script>
  const STUDY_TIME = 25 * 60 * 1000;
  const BREAK_TIME = 5 * 60 * 1000;

  let time = STUDY_TIME;
  let totalTime = STUDY_TIME;
  let isRunning = false;
  let isStudy = true;
  let timerId = null;
  let lastTick = null;

  const timerDisplay = document.getElementById("timer");
  const progressCircle = document.getElementById("progressCircle");
  const modeText = document.getElementById("modeText");

  const RADIUS = 98;
  const CIRCUMFERENCE = 2 * Math.PI * RADIUS;

  progressCircle.style.strokeDasharray = CIRCUMFERENCE;
  progressCircle.style.strokeDashoffset = 0;

  function updateDisplay() {
    const minutes = Math.floor(time / 60000);
    const seconds = Math.floor((time % 60000) / 1000);
    const ms = Math.floor((time % 1000) / 10);

    timerDisplay.textContent =
      `${String(minutes).padStart(2,'0')}:` +
      `${String(seconds).padStart(2,'0')}:` +
      `${String(ms).padStart(2,'0')}`;

    const progress = Math.max(0, time / totalTime);
    progressCircle.style.strokeDashoffset =
      CIRCUMFERENCE - (progress * CIRCUMFERENCE);
  }

  function startTimer() {
    if (isRunning) return;
    isRunning = true;
    lastTick = Date.now();

    timerId = setInterval(() => {
      const now = Date.now();
      time -= (now - lastTick);
      lastTick = now;

      if (time <= 0) {
        clearInterval(timerId);
        isRunning = false;
        switchMode();
      } else {
        updateDisplay();
      }
    }, 10);
  }

  function pauseTimer() {
    clearInterval(timerId);
    isRunning = false;
  }

  function resetTimer() {
    pauseTimer();
    isStudy = true;
    modeText.innerHTML =
      `<i class="fa-solid fa-clock text-emerald-500"></i><span>Focus Time</span>`;
    progressCircle.style.stroke = "#22c55e";
    time = totalTime = STUDY_TIME;
    updateDisplay();
  }

  function adjustTime(seconds) {
    if (isRunning) return;
    time = Math.max(60000, time + seconds * 1000);
    totalTime = time;
    updateDisplay();
  }

  function switchMode() {
    isStudy = !isStudy;

    if (isStudy) {
      modeText.innerHTML =
        `<i class="fa-solid fa-clock text-emerald-500"></i><span>Focus Time</span>`;
      progressCircle.style.stroke = "#22c55e";
      time = totalTime = STUDY_TIME;
    } else {
      modeText.innerHTML =
        `<i class="fa-solid fa-mug-hot text-blue-500"></i><span>Break Time</span>`;
      progressCircle.style.stroke = "#3b82f6";
      time = totalTime = BREAK_TIME;
    }
    updateDisplay();
    startTimer();
  }

  // Long-press logic
  let pressTimer = null;
  let repeatTimer = null;
  const STEP = 60;

  function startLongPress(dir) {
    adjustTime(dir * STEP);
    pressTimer = setTimeout(() => {
      repeatTimer = setInterval(() => {
        adjustTime(dir * STEP);
      }, 120);
    }, 400);
  }

  function stopLongPress() {
    clearTimeout(pressTimer);
    clearInterval(repeatTimer);
  }

  const plusBtn = document.getElementById("plusBtn");
  const minusBtn = document.getElementById("minusBtn");

  plusBtn.addEventListener("mousedown", () => startLongPress(1));
  plusBtn.addEventListener("touchstart", () => startLongPress(1));

  minusBtn.addEventListener("mousedown", () => startLongPress(-1));
  minusBtn.addEventListener("touchstart", () => startLongPress(-1));

  ["mouseup","mouseleave","touchend","touchcancel"].forEach(e => {
    plusBtn.addEventListener(e, stopLongPress);
    minusBtn.addEventListener(e, stopLongPress);
  });

  document.getElementById("startBtn").onclick = startTimer;
  document.getElementById("pauseBtn").onclick = pauseTimer;
  document.getElementById("resetBtn").onclick = resetTimer;

  updateDisplay();
</script>

{% endblock content %}
